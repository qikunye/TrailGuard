# ─── Frontend Deployment ──────────────────────────────────────────────────────
# NOTE: Build the frontend image AFTER you have Kong's LoadBalancer external IP.
# See scripts/02-build-push.sh — it takes KONG_IP as an argument.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: trailguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: trailguardt06acr.azurecr.io/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

# ─── Frontend Service (internal — ClusterIP, served through Kong) ─────────────
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: trailguard
spec:
  selector:
    app: frontend
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
