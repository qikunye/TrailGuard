# ─── hiker-profile ────────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hiker-profile
  namespace: trailguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hiker-profile
  template:
    metadata:
      labels:
        app: hiker-profile
    spec:
      containers:
        - name: hiker-profile
          image: trailguardt06acr.azurecr.io/hiker-profile:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          env:
            - name: PORT
              value: "8001"
          envFrom:
            - secretRef:
                name: trailguard-secrets
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: hiker-profile
  namespace: trailguard
spec:
  selector:
    app: hiker-profile
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP

