# ─── notification-wrapper ─────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-wrapper
  namespace: trailguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-wrapper
  template:
    metadata:
      labels:
        app: notification-wrapper
    spec:
      containers:
        - name: notification-wrapper
          image: trailguardt06acr.azurecr.io/notification-wrapper:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5050
          env:
            - name: PORT
              value: "5050"
            - name: RABBITMQ_URL
              value: "amqp://guest:guest@rabbitmq:5672/"
          envFrom:
            - secretRef:
                name: trailguard-secrets
          volumeMounts:
            - name: telegram-registry
              mountPath: /app/data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 5050
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: telegram-registry
          persistentVolumeClaim:
            claimName: telegram-registry-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: notification-wrapper
  namespace: trailguard
spec:
  selector:
    app: notification-wrapper
  ports:
    - port: 5050
      targetPort: 5050
  type: ClusterIP
