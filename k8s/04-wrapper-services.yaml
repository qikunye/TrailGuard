# ─── weather-wrapper ──────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-wrapper
  namespace: trailguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-wrapper
  template:
    metadata:
      labels:
        app: weather-wrapper
    spec:
      containers:
        - name: weather-wrapper
          image: trailguardt06acr.azurecr.io/weather-wrapper:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8005
          env:
            - name: PORT
              value: "8005"
          envFrom:
            - secretRef:
                name: trailguard-secrets
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: weather-wrapper
  namespace: trailguard
spec:
  selector:
    app: weather-wrapper
  ports:
    - port: 8005
      targetPort: 8005
  type: ClusterIP

