# ── ACME HTTP-01 solver service (routes Let's Encrypt challenges to cert-manager pods) ─
---
apiVersion: v1
kind: Service
metadata:
  name: acme-solver
  namespace: trailguard
spec:
  selector:
    acme.cert-manager.io/http01-solver: "true"
  ports:
    - port: 8089
      targetPort: 8089

# ── Let's Encrypt ClusterIssuer ───────────────────────────────────────────────
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: abc_qk_test@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: ""

# ── TLS Certificate for sslip.io domain ──────────────────────────────────────
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: trailguard-tls
  namespace: trailguard
spec:
  secretName: trailguard-tls-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - 20-187-179-238.sslip.io
