services:

  # ─── Kong API Gateway ────────────────────────────────────────
  # Single unified entry point for all client requests.
  # DB-less mode: all config lives in kong/kong.yml (no Postgres needed).
  kong:
    image: kong:3.6
    platform: linux/amd64
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
      # Upstream timeouts in milliseconds (for slow LLM / OutSystems calls)
      KONG_PROXY_READ_TIMEOUT: "120000"
      KONG_PROXY_WRITE_TIMEOUT: "120000"
      KONG_PROXY_CONNECT_TIMEOUT: "10000"
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    ports:
      - "8080:8000"    # HTTP proxy  — clients call http://localhost:8080/api/...
      - "8443:8443"    # HTTPS proxy — ready for TLS certs when you add them
      - "8001:8001"    # Admin API   — NEVER expose publicly in production!
    networks:
      - trailguard
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─── Prometheus ─────────────────────────────────────────────
  # Scrapes Kong metrics from http://kong:8001/metrics every 15s.
  # Dashboard: http://localhost:9090
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - trailguard
    restart: unless-stopped
    depends_on:
      kong:
        condition: service_healthy

  # ─── Grafana ─────────────────────────────────────────────────
  # Visualise Kong metrics. Dashboard: http://localhost:13000
  # Default login: admin / admin  (change on first login)
  # Import Kong official dashboard: ID 7424
  grafana:
    image: grafana/grafana:latest
    ports:
      - "13000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks:
      - trailguard
    restart: unless-stopped
    depends_on:
      - prometheus

  # ─── Konga — Kong Admin UI ───────────────────────────────────
  # Dashboard for inspecting routes, consumers, plugins, and logs.
  # Access at: http://localhost:1337
  # On first login, connect to: http://kong:8001
  konga:
    image: pantsel/konga:latest
    platform: linux/amd64
    ports:
      - "1337:1337"
    environment:
      NODE_ENV: development
    networks:
      - trailguard
    restart: unless-stopped
    depends_on:
      kong:
        condition: service_healthy

  # ─── Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    env_file:
      - ./Frontend/.env
    depends_on:
      kong:
        condition: service_healthy
    networks:
      - trailguard

  # ─── Orchestrator ───────────────────────────────────────────
  # NOTE: No host port exposed — all external traffic must go through Kong.
  orchestrator:
    build:
      context: ./Services
      dockerfile: orchestrator/Dockerfile
    expose:
      - "8000"
    environment:
      - PORT=8000
      - HIKER_PROFILE_URL=http://hiker-profile:8001
      - TRAIL_CONDITION_URL=http://trail-condition:8002
      - INCIDENT_RISK_URL=http://incident-risk:8003
      - HIKE_COMPLETION_URL=http://hike-completion:8004
      - WEATHER_WRAPPER_URL=http://weather-wrapper:8005
      - EVALUATOR_WRAPPER_URL=http://evaluator-wrapper:8006
      - GOOGLEMAPS_URL=http://googlemaps-wrapper:8007
    env_file:
      - ./Services/.env
    depends_on:
      - hiker-profile
      - trail-condition
      - incident-risk
      - hike-completion
      - weather-wrapper
      - evaluator-wrapper
      - googlemaps-wrapper
      - notification-wrapper
      - alternative-route
    networks:
      - trailguard

  # ─── Atomic Services ────────────────────────────────────────
  hiker-profile:
    build:
      context: ./Services/atomic
      dockerfile: Dockerfile
      args:
        SERVICE: Hiker_Profile_Service
    expose:
      - "8001"
    environment:
      - PORT=8001
    env_file:
      - ./Services/.env
    networks:
      - trailguard

  trail-condition:
    build:
      context: ./Services/atomic
      dockerfile: Dockerfile
      args:
        SERVICE: Trail_Condition_Service
    expose:
      - "8002"
    environment:
      - PORT=8002
    env_file:
      - ./Services/.env
    networks:
      - trailguard

  incident-risk:
    build:
      context: ./Services/atomic
      dockerfile: Dockerfile
      args:
        SERVICE: Incident_Risk_Service
    expose:
      - "8003"
    environment:
      - PORT=8003
    env_file:
      - ./Services/.env
    networks:
      - trailguard

  hike-completion:
    build:
      context: ./Services/atomic
      dockerfile: Dockerfile
      args:
        SERVICE: Hike_Completion_Service
    expose:
      - "8004"
    environment:
      - PORT=8004
    env_file:
      - ./Services/.env
    networks:
      - trailguard

  # ─── Wrappers ────────────────────────────────────────────────
  weather-wrapper:
    build:
      context: ./Services
      dockerfile: wrappers/Dockerfile
      args:
        SERVICE: Weather_Wrapper
    expose:
      - "8005"
    environment:
      - PORT=8005
    env_file:
      - ./Services/.env
    networks:
      - trailguard

  evaluator-wrapper:
    build:
      context: ./Services
      dockerfile: wrappers/Dockerfile
      args:
        SERVICE: Evaluator_Wrapper
    expose:
      - "8006"
    environment:
      - PORT=8006
    env_file:
      - ./Services/.env
    networks:
      - trailguard

  googlemaps-wrapper:
    build:
      context: ./Services
      dockerfile: wrappers/Dockerfile
      args:
        SERVICE: GoogleMaps_Wrapper
    expose:
      - "8007"
    environment:
      - PORT=8007
    env_file:
      - ./Services/.env
    networks:
      - trailguard

  # ─── Notification Wrapper (Twilio SMS + Telegram) ───────────
  notification-wrapper:
    build:
      context: ./Services
      dockerfile: Dockerfile.notification
    expose:
      - "5050"
    environment:
      - PORT=5050
    env_file:
      - ./Services/.env
    volumes:
      - telegram_registry:/app/data
    networks:
      - trailguard
    restart: unless-stopped

  # ─── Incident Reporting Service ─────────────────────────────
  incident-reporting:
    build:
      context: ./Services
      dockerfile: orchestrator/Dockerfile
    command: uvicorn Incident_Reporting_Service:app --host 0.0.0.0 --port 8008
    expose:
      - "8008"
    environment:
      - PORT=8008
      - GOOGLEMAPS_URL=http://googlemaps-wrapper:8007
      - EMERGENCY_CONTACTS_URL=http://emergency-contacts:5003
      - NOTIFICATION_URL=http://notification-wrapper:5050
      - NEARBY_USERS_URL=http://nearby-users:5005
      - TRAIL_INCIDENT_URL=http://incident-service:5004
    env_file:
      - ./Services/.env
    depends_on:
      - notification-wrapper
      - googlemaps-wrapper
      - emergency-contacts
      - nearby-users
      - incident-service
    networks:
      - trailguard
    restart: unless-stopped

  # ─── Incident Service (Firestore) ───────────────────────────
  incident-service:
    build:
      context: ./Services/atomic
      dockerfile: Dockerfile
      args:
        SERVICE: Trail_Incident
    expose:
      - "5004"
    environment:
      - PORT=5004
    env_file:
      - ./Services/.env
    networks:
      - trailguard
    restart: unless-stopped

  # ─── Emergency Contacts ─────────────────────────────────────
  emergency-contacts:
    build:
      context: ./Services/atomic
      dockerfile: Dockerfile
      args:
        SERVICE: Emergency_Contacts_Service
    expose:
      - "5003"
    environment:
      - PORT=5003
    env_file:
      - ./Services/.env
    networks:
      - trailguard
    restart: unless-stopped

  # ─── Nearby Users Service ────────────────────────────────────
  nearby-users:
    build:
      context: ./Services/atomic
      dockerfile: Dockerfile
      args:
        SERVICE: Nearby_Users_Service
    expose:
      - "5005"
    environment:
      - PORT=5005
    env_file:
      - ./Services/.env
    networks:
      - trailguard
    restart: unless-stopped

  # ─── Completed User Hike Service ─────────────────────────────
  completed-user-hike:
    build:
      context: ./Services/atomic
      dockerfile: Dockerfile
      args:
        SERVICE: Completed_User_Hike_Service
    expose:
      - "5006"
    environment:
      - PORT=5006
    env_file:
      - ./Services/.env
    networks:
      - trailguard
    restart: unless-stopped


  # ─── Report Ingestion Service (Scenario 3 — Hazard Reporting) ────
  report-ingestion:
    build:
      context: ./Services
      dockerfile: orchestrator/Dockerfile
    command: uvicorn Report_Ingestion_Service:app --host 0.0.0.0 --port 8010
    expose:
      - "8010"
    environment:
      - PORT=8010
      - TRAIL_CONDITION_URL=http://trail-condition:8002
      - NOTIFICATION_URL=http://notification-wrapper:5050
      - ALTERNATIVE_ROUTE_URL=http://alternative-route:8009
      - NEARBY_USERS_URL=http://nearby-users:5005
    env_file:
      - ./Services/.env
    depends_on:
      - trail-condition
      - notification-wrapper
      - alternative-route
      - nearby-users
    networks:
      - trailguard
    restart: unless-stopped

  # ─── Alternative Route Service (Scenario 3 — Rerouting) ─────────
  alternative-route:
    build:
      context: ./Services
      dockerfile: orchestrator/Dockerfile
    command: uvicorn Alternative_Route_Service:app --host 0.0.0.0 --port 8009
    expose:
      - "8009"
    environment:
      - PORT=8009
      - TRAIL_CONDITION_URL=http://trail-condition:8002
      - GOOGLEMAPS_URL=http://googlemaps-wrapper:8007
      - REPORT_INGESTION_URL=http://report-ingestion:8010
    env_file:
      - ./Services/.env
    depends_on:
      - trail-condition
      - googlemaps-wrapper
    networks:
      - trailguard
    restart: unless-stopped


networks:
  trailguard:
    driver: bridge

volumes:
  grafana-data:
  telegram_registry:
