services:

  # ─── Kong API Gateway ────────────────────────────────────────
  # Single unified entry point for all client requests.
  # DB-less mode: all config lives in kong/kong.yml (no Postgres needed).
  kong:
    image: kong:3.6
    platform: linux/amd64
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
      # Upstream timeouts in milliseconds (for slow LLM / OutSystems calls)
      KONG_PROXY_READ_TIMEOUT: "120000"
      KONG_PROXY_WRITE_TIMEOUT: "120000"
      KONG_PROXY_CONNECT_TIMEOUT: "10000"
      # Re-resolve Docker service hostnames every 10s so container IP changes
      # after restarts don't cause stale-IP "Connection refused" errors
      KONG_DNS_ORDER: "LAST,A,CNAME"
      KONG_DNS_STALE_TTL: "10"
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    ports:
      - "8080:8000"    # HTTP proxy  — clients call http://localhost:8080/api/...
      - "8443:8443"    # HTTPS proxy — ready for TLS certs when you add them
      - "8001:8001"    # Admin API   — NEVER expose publicly in production!
    networks:
      - trailguard
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s


  # ─── Konga — Kong Admin UI ───────────────────────────────────
  # Dashboard for inspecting routes, consumers, plugins, and logs.
  # Access at: http://localhost:1337
  # On first login, connect to: http://kong:8001
  konga:
    image: pantsel/konga:latest
    platform: linux/amd64
    ports:
      - "1337:1337"
    environment:
      NODE_ENV: development
    networks:
      - trailguard
    restart: unless-stopped
    depends_on:
      kong:
        condition: service_healthy

  # ─── Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY}
        VITE_MAPS_WRAPPER_URL: ${VITE_MAPS_WRAPPER_URL}
        VITE_KONG_BASE_URL: ${VITE_KONG_BASE_URL}
        VITE_KONG_API_KEY: ${VITE_KONG_API_KEY}
        VITE_TRAIL_QUERY_URL: ${VITE_TRAIL_QUERY_URL}
    ports:
      - "5173:5173"
    depends_on:
      kong:
        condition: service_healthy
    networks:
      - trailguard

  # ─── Orchestrator ───────────────────────────────────────────
  # NOTE: No host port exposed — all external traffic must go through Kong.
  orchestrator:
    build:
      context: ./Services
      dockerfile: orchestrator/Dockerfile
    expose:
      - "8000"
    environment:
      - PORT=8000
      - HIKER_PROFILE_URL=http://hiker-profile:8001
      - TRAIL_CONDITION_URL=http://trail-condition:8002
      - INCIDENT_RISK_URL=http://incident-risk:8003
      - HIKE_COMPLETION_URL=http://hike-completion:8004
      - WEATHER_WRAPPER_URL=http://weather-wrapper:8005
      - EVALUATOR_WRAPPER_URL=http://evaluator-wrapper:8006
      - GOOGLEMAPS_URL=http://googlemaps-wrapper:8007
    env_file:
      - ./.env
    depends_on:
      - hiker-profile
      - trail-condition
      - incident-risk
      - hike-completion
      - weather-wrapper
      - evaluator-wrapper
      - googlemaps-wrapper
      - notification-wrapper
      - alternative-route
    networks:
      - trailguard

  # ─── Atomic Services ────────────────────────────────────────
  hiker-profile:
    build:
      context: ./Services/atomic
      dockerfile: Dockerfile
      args:
        SERVICE: Hiker_Profile_Service
    expose:
      - "8001"
    environment:
      - PORT=8001
    env_file:
      - ./.env
    networks:
      - trailguard

  trail-condition:
    build:
      context: ./Services/atomic
      dockerfile: Dockerfile
      args:
        SERVICE: Trail_Condition_Service
    expose:
      - "8002"
    environment:
      - PORT=8002
    env_file:
      - ./.env
    networks:
      - trailguard

  trail-query:
    build:
      context: ./Services/atomic
      dockerfile: Dockerfile
      args:
        SERVICE: Trail_Query_Service
    expose:
      - "8011"
    ports:
      - "8011:8011"
    environment:
      - PORT=8011
      - TRAIL_CONDITION_URL=http://trail-condition:8002
      - TRAIL_INCIDENT_URL=http://incident-service:5004
      - GOOGLEMAPS_URL=http://googlemaps-wrapper:8007
    env_file:
      - ./.env
    networks:
      - trailguard

  incident-risk:
    build:
      context: ./Services/atomic
      dockerfile: Dockerfile
      args:
        SERVICE: Incident_Risk_Service
    expose:
      - "8003"
    environment:
      - PORT=8003
      - OUTSYSTEMS_INCIDENTS_URL=${OUTSYSTEMS_INCIDENTS_URL:-https://personal-eisumi2z.outsystemscloud.com/HikerProfileService/rest/IncidentsAPI}
    env_file:
      - ./.env
    networks:
      - trailguard

  hike-completion:
    build:
      context: ./Services/atomic
      dockerfile: Dockerfile
      args:
        SERVICE: Hike_Completion_Service
    expose:
      - "8004"
    environment:
      - PORT=8004
    env_file:
      - ./.env
    networks:
      - trailguard

  # ─── Wrappers ────────────────────────────────────────────────
  weather-wrapper:
    build:
      context: ./Services
      dockerfile: wrappers/Dockerfile
      args:
        SERVICE: Weather_Wrapper
    expose:
      - "8005"
    environment:
      - PORT=8005
    env_file:
      - ./.env
    networks:
      - trailguard

  evaluator-wrapper:
    build:
      context: ./Services
      dockerfile: wrappers/Dockerfile
      args:
        SERVICE: Evaluator_Wrapper
    expose:
      - "8006"
    environment:
      - PORT=8006
    env_file:
      - ./.env
    networks:
      - trailguard

  googlemaps-wrapper:
    build:
      context: ./Services
      dockerfile: wrappers/Dockerfile
      args:
        SERVICE: GoogleMaps_Wrapper
    expose:
      - "8007"
    environment:
      - PORT=8007
    env_file:
      - ./.env
    networks:
      - trailguard

  # ─── Notification Wrapper (Twilio SMS + Telegram) ───────────
  notification-wrapper:
    build:
      context: ./Services
      dockerfile: Dockerfile.notification
    expose:
      - "5050"
    environment:
      - PORT=5050
      - PYTHONUNBUFFERED=1
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    env_file:
      - ./.env
    volumes:
      - telegram_registry:/app/data
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - trailguard
    restart: unless-stopped

  # ─── Incident Reporting Service ─────────────────────────────
  incident-reporting:
    build:
      context: ./Services
      dockerfile: orchestrator/Dockerfile
    command: uvicorn Incident_Reporting_Service:app --host 0.0.0.0 --port 8008
    expose:
      - "8008"
    environment:
      - PORT=8008
      - GOOGLEMAPS_URL=http://googlemaps-wrapper:8007
      - EMERGENCY_CONTACTS_URL=http://emergency-contacts:5003
      - NOTIFICATION_URL=http://notification-wrapper:5050
      - NEARBY_USERS_URL=http://nearby-users:5005
      - TRAIL_INCIDENT_URL=http://incident-service:5004
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    env_file:
      - ./.env
    depends_on:
      - notification-wrapper
      - googlemaps-wrapper
      - emergency-contacts
      - nearby-users
      - incident-service
      - rabbitmq
    networks:
      - trailguard
    restart: unless-stopped

  # ─── Incident Service (Firestore) ───────────────────────────
  incident-service:
    build:
      context: ./Services/atomic
      dockerfile: Dockerfile
      args:
        SERVICE: Trail_Incident
    expose:
      - "5004"
    environment:
      - PORT=5004
    env_file:
      - ./.env
    networks:
      - trailguard
    restart: unless-stopped

  # ─── Emergency Contacts ─────────────────────────────────────
  emergency-contacts:
    build:
      context: ./Services/atomic
      dockerfile: Dockerfile
      args:
        SERVICE: Emergency_Contacts_Service
    expose:
      - "5003"
    environment:
      - PORT=5003
    env_file:
      - ./.env
    networks:
      - trailguard
    restart: unless-stopped

  # ─── Nearby Users Service ────────────────────────────────────
  nearby-users:
    build:
      context: ./Services/atomic
      dockerfile: Dockerfile
      args:
        SERVICE: Nearby_Users_Service
    expose:
      - "5005"
    environment:
      - PORT=5005
    env_file:
      - ./.env
    networks:
      - trailguard
    restart: unless-stopped

  # ─── Completed User Hike Service ─────────────────────────────
  completed-user-hike:
    build:
      context: ./Services/atomic
      dockerfile: Dockerfile
      args:
        SERVICE: Completed_User_Hike_Service
    expose:
      - "5006"
    environment:
      - PORT=5006
    env_file:
      - ./.env
    networks:
      - trailguard
    restart: unless-stopped


  # ─── Report Ingestion Service (Scenario 3 — Hazard Reporting) ────
  report-ingestion:
    build:
      context: ./Services
      dockerfile: orchestrator/Dockerfile
    command: uvicorn Report_Ingestion_Service:app --host 0.0.0.0 --port 8010
    expose:
      - "8010"
    environment:
      - PORT=8010
      - TRAIL_CONDITION_URL=http://trail-condition:8002
      - NOTIFICATION_URL=http://notification-wrapper:5050
      - ALTERNATIVE_ROUTE_URL=http://alternative-route:8009
      - NEARBY_USERS_URL=http://nearby-users:5005
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    env_file:
      - ./.env
    depends_on:
      - trail-condition
      - notification-wrapper
      - alternative-route
      - nearby-users
      - rabbitmq
    networks:
      - trailguard
    restart: unless-stopped

  # ─── Alternative Route Service (Scenario 3 — Rerouting) ─────────
  alternative-route:
    build:
      context: ./Services
      dockerfile: orchestrator/Dockerfile
    command: uvicorn Alternative_Route_Service:app --host 0.0.0.0 --port 8009
    expose:
      - "8009"
    environment:
      - PORT=8009
      - TRAIL_CONDITION_URL=http://trail-condition:8002
      - GOOGLEMAPS_URL=http://googlemaps-wrapper:8007
      - REPORT_INGESTION_URL=http://report-ingestion:8010
    env_file:
      - ./.env
    depends_on:
      - trail-condition
      - googlemaps-wrapper
    networks:
      - trailguard
    restart: unless-stopped


  # ─── RabbitMQ Message Broker ─────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    hostname: rabbitmq
    expose:
      - "5672"
    ports:
      - "15672:15672"   # Management UI — http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - trailguard
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s


networks:
  trailguard:
    driver: bridge

volumes:
  telegram_registry:
