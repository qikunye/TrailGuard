<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrailGuard</title>
    <style>
      :root {
        --bg:           #07100a;
        --card:         #0e1a10;
        --surface:      #152018;
        --border:       #233d29;
        --primary:      #5c9e40;
        --primary-dim:  rgba(92,158,64,0.18);
        --text:         #c8ddb0;
        --text-muted:   #618055;
        --text-link:    #7ec85a;
        --error-bg:     #2a1212;
        --error-text:   #e07070;
        --success-bg:   #0d2212;
        --success-text: #6ccf5a;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, -apple-system, sans-serif;
        background-color: var(--bg);
        background-image:
          radial-gradient(ellipse at 30% 20%, rgba(30,70,20,0.35) 0%, transparent 55%),
          radial-gradient(ellipse at 75% 85%, rgba(15,50,15,0.3) 0%, transparent 50%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        /* subtle speckle */
        position: relative;
      }

      /* Firefly speckles */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          radial-gradient(circle, rgba(180,230,120,0.55) 1px, transparent 1px),
          radial-gradient(circle, rgba(180,230,120,0.35) 1px, transparent 1px),
          radial-gradient(circle, rgba(180,230,120,0.45) 1px, transparent 1px);
        background-size: 180px 160px, 260px 220px, 130px 200px;
        background-position: 20px 40px, 80px 100px, 140px 30px;
        pointer-events: none;
        z-index: 0;
      }

      /* Wordmark */
      .wordmark {
        font-size: 1.1rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--primary);
        margin-bottom: 1.25rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        position: relative;
        z-index: 1;
      }
      .wordmark svg { flex-shrink: 0; }

      /* Card */
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 2rem;
        width: 100%;
        max-width: 380px;
        position: relative;
        z-index: 1;
      }

      /* Tab toggle */
      .tab-toggle {
        display: grid;
        grid-template-columns: 1fr 1fr;
        background: var(--surface);
        border-radius: 50px;
        padding: 4px;
        margin-bottom: 1.75rem;
      }
      .tab {
        background: none;
        border: none;
        border-radius: 50px;
        padding: 0.6rem 1rem;
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--text-muted);
        cursor: pointer;
        transition: background 0.2s, color 0.2s;
        width: 100%;
      }
      .tab.active {
        background: var(--primary);
        color: #071008;
      }

      /* Fields */
      .field { margin-bottom: 1.1rem; }
      .field label {
        display: block;
        font-size: 0.82rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: var(--text);
        margin-bottom: 0.4rem;
        font-family: monospace;
      }
      .input-wrap {
        display: flex;
        align-items: center;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 50px;
        padding: 0 1rem;
        gap: 0.6rem;
        transition: border-color 0.2s;
      }
      .input-wrap:focus-within {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--primary-dim);
      }
      .input-wrap svg { flex-shrink: 0; color: var(--text-muted); }
      .input-wrap input {
        flex: 1;
        background: none;
        border: none;
        outline: none;
        color: var(--text);
        font-size: 0.92rem;
        padding: 0.75rem 0;
        font-family: inherit;
      }
      .input-wrap input::placeholder { color: var(--text-muted); }
      .eye-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-muted);
        display: flex;
        padding: 0;
        width: auto;
        transition: color 0.15s;
      }
      .eye-btn:hover { color: var(--text); }

      /* Row: remember + forgot */
      .row-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1.4rem;
        margin-top: -0.2rem;
      }
      .checkbox-label {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        font-size: 0.85rem;
        color: var(--text-muted);
        cursor: pointer;
        user-select: none;
      }
      .checkbox-label input[type="checkbox"] {
        accent-color: var(--primary);
        width: 15px;
        height: 15px;
        cursor: pointer;
      }
      .link {
        font-size: 0.85rem;
        color: var(--text-link);
        text-decoration: none;
      }
      .link:hover { text-decoration: underline; }

      /* Buttons */
      .btn-primary {
        width: 100%;
        padding: 0.8rem 1rem;
        background: var(--primary);
        color: #071008;
        border: none;
        border-radius: 50px;
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        transition: opacity 0.15s, transform 0.1s;
        margin-bottom: 1.25rem;
      }
      .btn-primary:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
      .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

      /* Divider */
      .divider {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1.25rem;
      }
      .divider::before,
      .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
      }
      .divider span {
        font-size: 0.8rem;
        color: var(--primary);
        white-space: nowrap;
        font-weight: 500;
      }

      /* Google button */
      .btn-google {
        width: 100%;
        padding: 0.8rem 1rem;
        background: none;
        border: 1px solid var(--border);
        border-radius: 50px;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.65rem;
        transition: border-color 0.2s, background 0.2s;
      }
      .btn-google:hover:not(:disabled) {
        border-color: var(--primary);
        background: var(--primary-dim);
      }
      .btn-google:disabled { opacity: 0.45; cursor: not-allowed; }

      /* Toast / status */
      .toast {
        display: none;
        align-items: center;
        gap: 0.5rem;
        padding: 0.65rem 0.9rem;
        border-radius: 10px;
        font-size: 0.85rem;
        margin-bottom: 1.25rem;
      }
      .toast.show { display: flex; }
      .toast.error   { background: var(--error-bg);   color: var(--error-text);   border: 1px solid #5a1a1a; }
      .toast.success { background: var(--success-bg); color: var(--success-text); border: 1px solid #1a4a1a; }
      .toast.loading { background: #0d1a14; color: #7ec8a0; border: 1px solid #1a3d28; }

      /* Signed-in panel */
      #panel-signedin { display: none; }
      #panel-signedin.show { display: block; }
      #panel-auth.hide { display: none; }

      .user-card {
        display: flex;
        align-items: center;
        gap: 0.9rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 1rem;
        margin-bottom: 1.25rem;
      }
      .user-card img {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        border: 2px solid var(--primary);
        object-fit: cover;
      }
      .user-card .avatar-placeholder {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        border: 2px solid var(--primary);
        background: var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        font-size: 1.4rem;
        flex-shrink: 0;
      }
      .user-card .info { min-width: 0; }
      .user-card strong {
        display: block;
        color: var(--text);
        font-size: 0.95rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .user-card span {
        font-size: 0.82rem;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        display: block;
      }

      .btn-signout {
        width: 100%;
        padding: 0.75rem;
        background: none;
        border: 1px solid var(--border);
        border-radius: 50px;
        color: var(--text-muted);
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: border-color 0.2s, color 0.2s;
      }
      .btn-signout:hover { border-color: var(--error-text); color: var(--error-text); }
    </style>
  </head>
  <body>

    <div class="wordmark">
      <!-- Mountain / trail icon -->
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 20l5-9 4 6 3-4 6 7"/>
        <circle cx="17" cy="6" r="2"/>
      </svg>
      TrailGuard
    </div>

    <div class="card">

      <!-- Toast -->
      <div class="toast" id="toast"></div>

      <!-- Signed-in panel -->
      <div id="panel-signedin">
        <div class="user-card">
          <div id="user-avatar"></div>
          <div class="info">
            <strong id="user-name"></strong>
            <span id="user-email"></span>
          </div>
        </div>
        <button class="btn-signout" id="btn-signout">Sign out</button>
      </div>

      <!-- Auth panel -->
      <div id="panel-auth">

        <!-- Tab toggle -->
        <div class="tab-toggle">
          <button class="tab active" id="tab-login">Log In</button>
          <button class="tab" id="tab-register">Register</button>
        </div>

        <!-- Email -->
        <div class="field">
          <label>Email Address</label>
          <div class="input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
            <input type="email" id="email" placeholder="john@example.com" autocomplete="email" />
          </div>
        </div>

        <!-- Password -->
        <div class="field">
          <label>Password</label>
          <div class="input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
            <button class="eye-btn" id="btn-eye" type="button" title="Toggle password">
              <!-- Eye open -->
              <svg id="icon-eye-open" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <!-- Eye closed -->
              <svg id="icon-eye-closed" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
                <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
                <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
                <line x1="2" y1="2" x2="22" y2="22"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Remember me / Forgot -->
        <div class="row-meta" id="row-meta">
          <label class="checkbox-label">
            <input type="checkbox" id="remember" />
            Remember me
          </label>
          <a href="#" class="link" id="link-forgot">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button class="btn-primary" id="btn-submit">
          <span id="btn-label">Sign In</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>

        <!-- Divider -->
        <div class="divider"><span>Or continue with</span></div>

        <!-- Google -->
        <button class="btn-google" id="btn-google">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>

      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
